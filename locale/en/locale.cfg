[mod-setting-name]

F077SSF-use-multiplier=Use stack multiplier?

F077SSF-val-multiplier=Set stack multiplier

F077SSF-use-static=Use fixed stack size?

F077SSF-val-static=Set fixed stack size

F077SSF-force-stacking=Force item stacking?

F077SSF-use-custom-formula=Use custom formula?

F077SSF-val-custom-formula=Set custom formula

[mod-setting-description]

F077SSF-use-multiplier=multiply ALL stack sizes by a specific value.

F077SSF-use-static=use specific stack size for ALL items. it also gets multiplied if the other option is enabled.

F077SSF-force-stacking=force ALL items stacking (some of them are intended to never stack, use at your own risk).

F077SSF-use-custom-formula=use a custom formula to calculate stack sizes. it also affects the other settings if they're enabled. [color=#fff000](refer to the mod's page for the usage guide)[/color]
