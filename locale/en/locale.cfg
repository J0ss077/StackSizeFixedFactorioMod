[mod-setting-name]

F077SSF-use-multiplier=Use multiplier?

F077SSF-val-multiplier=Set multiplier

F077SSF-use-static=Use specific stack size?

F077SSF-val-static=Set specific stack size

F077SSF-force-stacking=Force stacking?

[mod-setting-description]

F077SSF-use-multiplier=multiply stack size by a specific value.

F077SSF-use-static=use specific stack size for ALL items.\nit also gets multiplied if the other option is enabled.

F077SSF-force-stacking=force ALL items stacking (some of them are intended to never stack. use at your own risk).
